<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders — ShopEth</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .order-card { margin-bottom: 20px; overflow: visible; }
    .order-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 20px 24px; cursor: pointer; background: var(--white);
      border-radius: var(--radius); box-shadow: var(--shadow-sm);
      border: 1px solid var(--ivory-dk); transition: var(--transition);
    }
    .order-header:hover { box-shadow: var(--shadow); }
    .order-meta { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
    .order-id   { font-family: var(--font-head); font-size: 1rem; color: var(--espresso); }
    .order-date { font-size: .83rem; color: var(--muted); }
    .order-total { font-weight: 700; font-size: 1.05rem; color: var(--brown); }
    .order-body {
      background: var(--ivory);
      border-radius: 0 0 var(--radius) var(--radius);
      padding: 0 24px; max-height: 0; overflow: hidden;
      transition: max-height .3s ease, padding .3s ease;
      border: 1px solid var(--ivory-dk); border-top: none;
    }
    .order-body.open { max-height: 600px; padding: 20px 24px; }
    .order-item-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid var(--ivory-dk);
      font-size: .9rem;
    }
    .order-item-row:last-child { border-bottom: none; }
    .order-tracking {
      display: flex; gap: 16px; padding: 14px 0; flex-wrap: wrap;
    }
    .track-chip {
      background: var(--white); border-radius: var(--radius-sm);
      padding: 8px 14px; font-size: .82rem; border: 1px solid var(--ivory-dk);
    }
    .track-chip strong { display: block; font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 2px; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-brand">Shop<span>Eth</span></a>
    <div class="navbar-links">
      <a href="index.html">Products</a>
      <a href="cart.html">Cart</a>
      <a href="orders.html" class="active">My Orders</a>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div id="nav-auth-links" style="display:flex;align-items:center;gap:8px;"></div>
      <a href="cart.html" class="navbar-cart">🛒 <span id="cart-count" class="cart-badge hidden">0</span></a>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <h1>My Orders</h1>
    <p>Track and review your purchase history</p>
  </div>
</div>

<section class="section">
  <div class="container">
    <div id="alert-box"></div>
    <div id="orders-list"><div class="spinner"></div></div>
  </div>
</section>

<footer class="footer">
  <div class="footer-brand">ShopEth</div>
  <p>&copy; 2025 ShopEth. All rights reserved.</p>
</footer>

<script src="../js/api.js"></script>
<script>
  window.addEventListener('DOMContentLoaded', () => {
    renderNavAuth();
    refreshCartBadge();
    if (!isLoggedIn()) {
      window.location.href = 'login.html'; return;
    }
    loadOrders();
  });

  async function loadOrders() {
    const res = await orders.getAll();
    const container = document.getElementById('orders-list');

    if (!res?.success) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><h3>Could not load orders</h3></div>`;
      return;
    }

    if (!res.data.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">📦</div>
          <h3>No orders yet</h3>
          <p>Start shopping to see your orders here.</p>
          <a href="index.html" class="btn btn-primary">Browse Products</a>
        </div>`;
      return;
    }

    container.innerHTML = res.data.map((o, i) => `
      <div class="order-card">
        <div class="order-header" onclick="toggleOrder(${i})">
          <div class="order-meta">
            <span class="order-id">Order #${o.order_id}</span>
            <span class="order-date">📅 ${new Date(o.order_date).toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'})}</span>
            <span class="badge badge-${o.order_status}">${o.order_status}</span>
          </div>
          <div style="display:flex;align-items:center;gap:16px;">
            <span class="order-total">${Number(o.total_amount).toLocaleString()} ETB</span>
            <span id="chevron-${i}" style="color:var(--muted);transition:transform .3s;">▼</span>
          </div>
        </div>
        <div class="order-body" id="order-body-${i}">
          <div class="order-tracking">
            <div class="track-chip"><strong>Payment</strong>${o.payment_status || 'N/A'}</div>
            <div class="track-chip"><strong>Shipping</strong>${o.shipping_status || 'N/A'}</div>
            ${o.courier_name ? `<div class="track-chip"><strong>Courier</strong>${o.courier_name}</div>` : ''}
            ${o.tracking_number ? `<div class="track-chip"><strong>Tracking #</strong>${o.tracking_number}</div>` : ''}
            ${o.coupon_code ? `<div class="track-chip"><strong>Coupon</strong>${o.coupon_code}</div>` : ''}
          </div>
          <button class="btn btn-sm btn-secondary" onclick="loadOrderDetail(${o.order_id}, ${i})" id="detail-btn-${i}">
            View Items
          </button>
          <div id="order-detail-${i}"></div>
        </div>
      </div>
    `).join('');
  }

  function toggleOrder(i) {
    const body    = document.getElementById(`order-body-${i}`);
    const chevron = document.getElementById(`chevron-${i}`);
    body.classList.toggle('open');
    chevron.style.transform = body.classList.contains('open') ? 'rotate(180deg)' : '';
  }

  async function loadOrderDetail(orderId, i) {
    const btn = document.getElementById(`detail-btn-${i}`);
    btn.disabled = true; btn.textContent = 'Loading…';

    const res = await orders.getById(orderId);
    btn.style.display = 'none';

    if (!res?.success) {
      document.getElementById(`order-detail-${i}`).innerHTML = `<p class="text-muted">Could not load items.</p>`;
      return;
    }

    const { items } = res.data;
    document.getElementById(`order-detail-${i}`).innerHTML = `
      <div style="margin-top:12px;">
        ${items.map(item => `
          <div class="order-item-row">
            <span>${item.product_name} × ${item.quantity}</span>
            <span style="font-weight:600;color:var(--brown);">${Number(item.subtotal).toLocaleString()} ETB</span>
          </div>
        `).join('')}
      </div>
    `;
  }
</script>
</body>
</html>
